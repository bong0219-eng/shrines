<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<meta name="theme-color" content="#0e1535">
<title>한국 천주교</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== 기본 ===== */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  background:#0e1535;
  font-family:'Noto Sans KR', sans-serif;
}

/* ===== 커버 ===== */
#cover{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#101734 0%,#0f183e 40%,#14224d 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow-y:auto;
}

/* ===== 내부 ===== */
.cv-inner{
  width:100%;
  max-width:430px;
  padding:40px 16px 100px;
  text-align:center;
}

/* ===== 타이틀 ===== */
.cv-title{
  font-size:28px;
  color:#f5edd8;
  margin-bottom:10px;
}

.cv-title em{
  color:#d4aa6a;
  font-style:normal;
}

/* ===== 설명 ===== */
.cv-sub{
  font-size:13px;
  color:rgba(245,237,216,0.7);
  margin-bottom:20px;
}

/* ===== 카드 그리드 ===== */
.cv-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* ===== 카드 ===== */
.cv-btn{
  background:linear-gradient(135deg,#1a2456,#0e1535);
  border-radius:20px;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

/* ===== 아이콘 (핵심) ===== */
.cv-btn-badge{
  width:56px;
  height:56px;
  border-radius:20px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:34px;

  background:rgba(255,255,255,0.2);
}

/* ===== 텍스트 ===== */
.cv-btn-label{
  font-size:14px;
  color:#f5edd8;
  font-weight:700;
}

.cv-btn-desc{
  font-size:11px;
  color:rgba(245,237,216,0.7);
}

/* ===== 색상 ===== */
.cv-btn-missa{background:linear-gradient(135deg,#8B4513,#5C2D0A);}
.cv-btn-shrine{background:linear-gradient(135deg,#2459df,#103b8e);}
.cv-btn-retreat{background:linear-gradient(135deg,#639f3d,#2f6a1d);}
.cv-btn-trail{background:linear-gradient(135deg,#2d64ef,#183f9d);}
.cv-btn-web{background:linear-gradient(135deg,#b92c2c,#7f1d1d);}
.cv-btn-parish{background:linear-gradient(135deg,#8a6138,#5f3d23);}

</style>
</head>

<body>

<div id="cover">
<div class="cv-inner">

<div class="cv-title">
한국 <em>천주교</em>
</div>

<div class="cv-sub">
성지순례 · 성당찾기 · 신앙생활
</div>

<div class="cv-grid">


<!-- 매일미사 -->
<div class="cv-btn cv-btn-missa">
  <div class="cv-btn-badge">✝️</div>
  <div class="cv-btn-label">매일미사</div>
  <div class="cv-btn-desc">오늘의 미사 · 복음</div>
</div>

<!-- 주요기도문 -->
<div class="cv-btn cv-btn-parish">
  <div class="cv-btn-badge">📖</div>
  <div class="cv-btn-label">주요기도문</div>
  <div class="cv-btn-desc">기본 기도 모음</div>
</div>

<!-- 성지순례 167곳 -->
<div class="cv-btn cv-btn-shrine">
  <div class="cv-btn-badge">⛪</div>
  <div class="cv-btn-label">성지순례 167곳</div>
  <div class="cv-btn-desc">CBCK 인준 스탬프북 기준</div>
</div>

<!-- 내 주변 성당 -->
<div class="cv-btn cv-btn-parish">
  <div class="cv-btn-badge">📍</div>
  <div class="cv-btn-label">내 주변 성당</div>
  <div class="cv-btn-desc">가까운 성당 찾기</div>
</div>

<!-- 피정의 집 -->
<div class="cv-btn cv-btn-retreat">
  <div class="cv-btn-badge">🌿</div>
  <div class="cv-btn-label">피정의 집</div>
  <div class="cv-btn-desc">영적 쉼 · 피정 장소</div>
</div>

<!-- 가톨릭 순례길 -->
<div class="cv-btn cv-btn-trail">
  <div class="cv-btn-badge">🚶</div>
  <div class="cv-btn-label">가톨릭 순례길</div>
  <div class="cv-btn-desc">도보 순례 코스</div>
</div>

<!-- 가톨릭 웹사이트 -->
<div class="cv-btn cv-btn-web">
  <div class="cv-btn-badge">🌐</div>
  <div class="cv-btn-label">가톨릭 웹사이트</div>
  <div class="cv-btn-desc">공식 사이트 모음</div>
</div>

<!-- 관구·교구 -->
<div class="cv-btn cv-btn-parish">
  <div class="cv-btn-badge">🏛️</div>
  <div class="cv-btn-label">관구·교구</div>
  <div class="cv-btn-desc">전국 교구 정보</div>
</div>

</div> <!-- grid -->
</div> <!-- inner -->
</div> <!-- cover -->

</body>
</html>
