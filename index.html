<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 순례길</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0&autoload=false"></script>
<style>
:root {
  --d:    #1D4ED8;  --d-lt: #EFF6FF;   /* 교구 — 진한 로열블루 */
  --l:    #2A8040;  --l-lt: #EEF7F1;   /* 지자체 — 초록 */
  --bg:   #F5F3EE;  --card: #FEFEFE;
  --bdr:  #E4DDD6;  --tx:   #252018;
  --sub:  #706858;  --dim:  #B8ADA0;
  --r: 13px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#C0B8B0;
  display:flex;align-items:center;justify-content:center;
}
.app{
  width:100%;height:100%;max-width:520px;
  display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;position:relative;
}
 
/* ── 헤더 ── */
.sr-header{
  flex-shrink:0;background:var(--card);
  border-bottom:1px solid var(--bdr);
  padding:14px 16px 0;z-index:30;
}
.sr-header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.sr-title{display:flex;align-items:center;gap:7px;}
.sr-title h1{font-size:17px;font-weight:800;color:var(--d);letter-spacing:-.3px;}
.sr-count{
  font-size:11px;font-weight:700;
  background:var(--d-lt);color:var(--d);
  padding:3px 9px;border-radius:10px;
  border:1px solid #cde0fc;
}
.sr-tabs{display:flex;gap:6px;padding-bottom:12px;}
.sr-tab{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:6px 16px;border-radius:20px;
  border:1.5px solid var(--bdr);
  background:var(--card);color:var(--sub);
  font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:background .15s,color .15s,border-color .15s;
  white-space:nowrap;
}
.sr-tab.on{background:var(--d);color:#fff;border-color:transparent;}
 
/* ── 지도 ── */
.map-wrap{flex:1;position:relative;min-height:0;display:flex;flex-direction:column;}
#kmap{flex:1;width:100%;}
 
/* ── 내 위치 버튼 ── */
.loc-btn{
  position:absolute;bottom:20px;right:14px;z-index:15;
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:22px;box-shadow:0 2px 12px rgba(0,0,0,.15);
  padding:9px 16px;display:flex;align-items:center;gap:6px;
  font-family:inherit;font-size:13px;font-weight:700;
  color:var(--d);cursor:pointer;
}
 
/* ── 바텀시트 ── */
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  background:var(--card);border-radius:20px 20px 0 0;
  border-top:1px solid var(--bdr);
  box-shadow:0 -4px 24px rgba(0,0,0,.12);
  padding:0 0 28px;
  transform:translateY(110%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  pointer-events:none;overflow:hidden;
}
.sheet.open{transform:translateY(0);pointer-events:all;}
.sh-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr);margin:10px auto 0;}
.sh-close{
  position:absolute;top:12px;right:14px;
  width:28px;height:28px;border-radius:50%;
  background:var(--bg);border:none;cursor:pointer;
  font-size:13px;color:var(--sub);
  display:flex;align-items:center;justify-content:center;
}
.sh-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 0;gap:8px;
}
.sh-bdg{font-size:12px;font-weight:800;padding:4px 10px;border-radius:6px;color:#fff;white-space:nowrap;flex-shrink:0;}
.sh-bdg.d{background:var(--d);}
.sh-bdg.l{background:var(--l);}
.sh-region{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sh-body{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px 12px;cursor:pointer;
}
.sh-ico{
  width:44px;height:44px;flex-shrink:0;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.sh-ico.d{background:var(--d-lt);}
.sh-ico.l{background:var(--l-lt);}
.sh-info{flex:1;min-width:0;}
.sh-name{font-size:17px;font-weight:800;color:var(--tx);line-height:1.38;word-break:keep-all;margin-bottom:3px;}
.sh-sub{font-size:12px;color:var(--sub);}
.sh-foot{
  border-top:1px solid #f0ede8;
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:#faf8f5;cursor:pointer;
}
.sh-url{font-size:11px;color:var(--d);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.sh-arr{font-size:16px;color:var(--dim);flex-shrink:0;}
 
/* ── 목록 ── */
.list-wrap{
  flex:1;min-height:0;
  overflow-y:scroll;-webkit-overflow-scrolling:touch;
  padding:14px 13px 60px;
  display:flex;flex-direction:column;gap:10px;
}
.list-wrap::-webkit-scrollbar{display:none;}
.hidden{display:none!important;}
 
/* ── 카드 ── */
.card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--bdr);
  box-shadow:0 1px 8px rgba(0,0,0,.06);
  flex-shrink:0;overflow:hidden;cursor:pointer;
  transition:transform .12s;
}
.card:active{transform:scale(0.983);}
.cr1{display:flex;align-items:center;gap:7px;padding:12px 14px 0;}
.cbdg{font-size:12px;font-weight:800;padding:4px 10px;border-radius:6px;color:#fff;white-space:nowrap;flex-shrink:0;}
.cbdg.d{background:var(--d);}
.cbdg.l{background:var(--l);}
.creg{font-size:12px;color:var(--sub);}
.cr2{display:flex;align-items:center;gap:12px;padding:9px 14px 12px;}
.cico{width:44px;height:44px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.cico.d{background:var(--d-lt);}
.cico.l{background:var(--l-lt);}
.cnm{font-size:16px;font-weight:700;color:var(--tx);word-break:keep-all;line-height:1.38;}
.cfoot{
  border-top:1px solid #f0ede8;
  padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:#faf8f5;
}
.curl{font-size:11px;color:var(--d);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.carr{font-size:15px;color:var(--dim);flex-shrink:0;margin-left:6px;}
 
/* 내 위치 점 */
.myloc{width:16px;height:16px;border-radius:50%;background:#2255CC;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(34,85,204,.22);}
</style>
</head>
<body>
 
<script>
(function(){
  var ua=navigator.userAgent||'';
  if(!/KAKAOTALK/i.test(ua)) return;
  if(/iPhone|iPad/i.test(ua)){
    document.write('<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center;gap:20px;background:#F5F3EE;font-family:sans-serif"><div style="font-size:44px">🌐</div><div style="font-size:17px;font-weight:800;color:#1D4ED8">Safari에서 열어주세요</div><div style="font-size:13px;color:#888;line-height:1.9">하단 <b>···</b> → <b>Safari로 열기</b></div></div>');
    return;
  }
  location.href='intent://'+location.href.replace(/https?:\/\//,'')+'#Intent;scheme=https;package=com.sec.android.app.sbrowser;end';
})();
</script>
 
<div class="app">
  <div class="sr-header">
    <div class="sr-header-top">
      <div class="sr-title">
        <span style="font-size:20px">🚶</span>
        <h1>순례길</h1>
      </div>
      <span class="sr-count" id="srCount">11개</span>
    </div>
    <div class="sr-tabs">
      <button class="sr-tab on" id="tabMap"  onclick="setView('map')">🗺 지도</button>
      <button class="sr-tab"    id="tabList" onclick="setView('list')">☰ 목록</button>
    </div>
  </div>
 
  <div class="map-wrap" id="viewMap">
    <div id="kmap"></div>
 
    <div class="sheet" id="sheet">
      <div class="sh-handle"></div>
      <button class="sh-close" onclick="closeSheet()">✕</button>
      <div class="sh-top">
        <span class="sh-bdg" id="shBdg"></span>
        <span class="sh-region" id="shReg"></span>
      </div>
      <div class="sh-body" id="shBody">
        <div class="sh-ico" id="shIco"></div>
        <div class="sh-info">
          <div class="sh-name" id="shNm"></div>
          <div class="sh-sub" id="shSub"></div>
        </div>
      </div>
      <div class="sh-foot" id="shFoot">
        <span class="sh-url" id="shUrl"></span>
        <span class="sh-arr">›</span>
      </div>
    </div>
 
    <button class="loc-btn" onclick="myLoc()">📍 내 위치</button>
  </div>
 
  <div class="list-wrap hidden" id="viewList"></div>
</div>
 
<script>
/* ── 데이터 ── */
var D=[
  {n:"천주교 서울 순례길",       op:"서울대교구",            t:"d", r:"서울시",                   lat:37.5644,lng:127.0104, ico:"✝️", url:"https://martyrs.or.kr/_web/mpilgrims/about.html"},
  {n:"성지순례길 '디딤길'",      op:"수원교구",              t:"d", r:"경기 수원시",               lat:37.2832,lng:127.0170, ico:"🙏", url:"https://www.casuwon.or.kr/holyland/pilgrimage"},
  {n:"원주교구 순례길 '님의 길'",   op:"원주교구",              t:"d", r:"강원 원주·횡성, 충북 제천", lat:37.3420,lng:127.9200, ico:"🌿", url:"https://sunraegil.seoji.net/course/all"},
  {n:"한티가는길",               op:"대구대교구",            t:"d", r:"경북 칠곡 (가실성당~한티순교성지)",  lat:36.0168,lng:128.6299, ico:"⛰️", url:"https://hantigil.or.kr/index"},
  {n:"광주대교구 순례길",        op:"광주대교구",            t:"d", r:"전남 나주·영광",             lat:35.0369,lng:126.7152, ico:"🕊️", url:"https://www.gjcatholic.or.kr/holyland/pilgrimage/noan_naju"},
  {n:"천주교 제주교구 순례길",       op:"제주교구",              t:"d", r:"제주",                      lat:33.4463,lng:126.3027, ico:"🌊", url:"http://santoviaggio.com/"},
  {n:"사제와 함께하는 도보순례", op:"안동교구",              t:"d", r:"경북 문경·상주",             lat:36.8001,lng:128.2113, ico:"👣", url:"https://www.acatholic.or.kr/sub4/sub2.asp"},
  {n:"전주교구 교우촌 도보순례",   op:"전주교구",              t:"d", r:"전북 전주·완주",             lat:35.8031,lng:127.1677, ico:"🌾", url:"https://www.jcatholic.or.kr/theme/main/pages/pilgrimage01.html"},
  {n:"보령 갈매못 성지순례길",   op:"보령시",                t:"l", r:"충남 보령",                 lat:36.4280,lng:126.5075, ico:"🌅", url:"https://www.brcn.go.kr/tour/sub02_02_02.do"},
  {n:"내포 천주교 순례길",       op:"사단법인 내포문화숲길", t:"l", r:"충남 예산·서산",             lat:36.7127,lng:126.5380, ico:"🌲", url:"https://naepotrail.org/course/catholic"},
  {n:"버그내순례길",             op:"당진시청",              t:"l", r:"충남 당진",                 lat:36.8199,lng:126.7848, ico:"🏞️", url:"https://beogeunae.dangjin.go.kr/pil1.html"}
];
 
var DC={d:'#1D4ED8', l:'#2A8040'};
var map, MK=[], sel=-1, myOv=null;
 
/* ── 마커 SVG (십자가 핀) — title 없애 지도 지역명 겹침 방지 ── */
function mkSVG(color,big){
  var w=big?54:42, h=big?66:52;
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 100 124">';
  s+='<ellipse cx="50" cy="121" rx="'+(big?24:20)+'" ry="'+(big?8:6)+'" fill="rgba(0,0,0,'+(big?.2:.12)+')" />';
  if(big) s+='<path d="M50 1C27 1 8 19 8 41 8 70 50 121 50 121 50 121 92 70 92 41 92 19 73 1 50 1Z" fill="white" opacity="0.25"/>';
  s+='<path d="M50 5C29.5 5 13 21.5 13 42 13 69 50 119 50 119 50 119 87 69 87 42 87 21.5 70.5 5 50 5Z"';
  s+=' fill="'+color+'" stroke="white" stroke-width="'+(big?5:3.5)+'"/>';
  s+='<rect x="44" y="17" width="12" height="48" rx="3" fill="white"/>';
  s+='<rect x="29" y="30" width="42" height="12" rx="3" fill="white"/>';
  s+='</svg>';
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s);
}
 
/* ── 지도 초기화 ── */
window.onload=function(){
  if(typeof kakao==='undefined'){
    document.getElementById('kmap').innerHTML=
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:#888;font-size:13px;padding:30px;text-align:center">'
      +'<div style="font-size:36px">🗺</div><b style="color:#444">지도를 불러올 수 없습니다</b>'
      +'GitHub Pages 주소(bong0219-eng.github.io)로 열어주세요.<br>로컬 파일(file://)에서는 지도 API가 작동하지 않습니다.</div>';
    buildList(); return;
  }
  kakao.maps.load(function(){
    map=new kakao.maps.Map(document.getElementById('kmap'),{
      center:new kakao.maps.LatLng(36.2,127.9), level:13
    });
    map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);
    D.forEach(function(d,i){
      var mk=new kakao.maps.Marker({
        position:new kakao.maps.LatLng(d.lat,d.lng), map:map,
        image:new kakao.maps.MarkerImage(
          mkSVG(DC[d.t],false),
          new kakao.maps.Size(42,52),
          {offset:new kakao.maps.Point(21,52)}
        ),
        /* title 제거 → 지도 위 말풍선(지역명) 겹침 없음 */
        zIndex:1
      });
      (function(d,i){
        kakao.maps.event.addListener(mk,'click',function(){ selMk(i); openSheet(i); });
      })(d,i);
      MK.push(mk);
    });
    kakao.maps.event.addListener(map,'click',closeSheet);
    buildList();
  });
};
 
/* ── 마커 강조 ── */
function selMk(i){
  if(sel>=0){
    MK[sel].setImage(new kakao.maps.MarkerImage(mkSVG(DC[D[sel].t],false),new kakao.maps.Size(42,52),{offset:new kakao.maps.Point(21,52)}));
    MK[sel].setZIndex(1);
  }
  sel=i;
  MK[i].setImage(new kakao.maps.MarkerImage(mkSVG(DC[D[i].t],true),new kakao.maps.Size(54,66),{offset:new kakao.maps.Point(27,66)}));
  MK[i].setZIndex(999);
}
 
/* ── 바텀시트 ── */
function openSheet(i){
  var d=D[i];
  var label=d.t==='d'?'교구 운영':'지자체·단체';
  var urlTxt=d.url.replace(/https?:\/\//,'').replace(/\/$/,'');
 
  document.getElementById('shBdg').textContent=d.op;
  document.getElementById('shBdg').className='sh-bdg '+d.t;
  document.getElementById('shBdg').style.background='';
  document.getElementById('shReg').textContent='📍 '+d.r;
  document.getElementById('shIco').textContent=d.ico;
  document.getElementById('shIco').className='sh-ico '+d.t;
  document.getElementById('shNm').textContent=d.n;
  document.getElementById('shSub').textContent=label+' · '+d.r;
  document.getElementById('shUrl').textContent=urlTxt;
 
  /* body + foot 탭 → 홈페이지 */
  var cb=function(){location.href=d.url;};
  document.getElementById('shBody').onclick=cb;
  document.getElementById('shFoot').onclick=cb;
  document.getElementById('shFoot').style.display='flex';
 
  document.getElementById('sheet').classList.add('open');
  map.panTo(new kakao.maps.LatLng(d.lat,d.lng));
}
 
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  if(sel>=0){
    MK[sel].setImage(new kakao.maps.MarkerImage(mkSVG(DC[D[sel].t],false),new kakao.maps.Size(42,52),{offset:new kakao.maps.Point(21,52)}));
    MK[sel].setZIndex(1); sel=-1;
  }
}
 
/* ── 목록 ── */
function buildList(){
  var wrap=document.getElementById('viewList'); wrap.innerHTML='';
  D.forEach(function(d,i){
    var card=document.createElement('div'); card.className='card';
 
    var r1=document.createElement('div'); r1.className='cr1';
    var b=document.createElement('span'); b.className='cbdg '+d.t; b.textContent=d.op;
    var rg=document.createElement('span'); rg.className='creg'; rg.textContent='📍 '+d.r;
    r1.appendChild(b); r1.appendChild(rg);
 
    var r2=document.createElement('div'); r2.className='cr2';
    var ico=document.createElement('div'); ico.className='cico '+d.t; ico.textContent=d.ico;
    var nm=document.createElement('div'); nm.className='cnm'; nm.textContent=d.n;
    r2.appendChild(ico); r2.appendChild(nm);
 
    var foot=document.createElement('div'); foot.className='cfoot';
    var curl=document.createElement('span'); curl.className='curl';
    curl.textContent=d.url.replace(/https?:\/\//,'').replace(/\/$/,'');
    var carr=document.createElement('span'); carr.className='carr'; carr.textContent='›';
    foot.appendChild(curl); foot.appendChild(carr);
 
    card.appendChild(r1); card.appendChild(r2); card.appendChild(foot);
    card.addEventListener('click',(function(url){return function(){location.href=url;};})(d.url));
    wrap.appendChild(card);
  });
}
 
/* ── 뷰 전환 ── */
function setView(v){
  var vm=document.getElementById('viewMap'), vl=document.getElementById('viewList');
  var tm=document.getElementById('tabMap'),  tl=document.getElementById('tabList');
  if(v==='map'){
    vm.classList.remove('hidden'); vl.classList.add('hidden');
    tm.classList.add('on'); tl.classList.remove('on');
    if(map) setTimeout(function(){kakao.maps.event.trigger(map,'resize');},10);
  } else {
    vm.classList.add('hidden'); vl.classList.remove('hidden');
    tm.classList.remove('on'); tl.classList.add('on');
  }
}
 
/* ── 내 위치 ── */
function myLoc(){
  if(!navigator.geolocation){alert('위치 서비스 미지원');return;}
  function show(pos){
    var ll=new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude);
    map.panTo(ll); map.setLevel(7);
    if(myOv) myOv.setMap(null);
    var dot=document.createElement('div'); dot.className='myloc';
    myOv=new kakao.maps.CustomOverlay({content:dot,position:ll,yAnchor:.5,zIndex:100});
    myOv.setMap(map);
  }
  navigator.geolocation.getCurrentPosition(show,
    function(e){alert(e.code===1?'위치 권한을 허용해 주세요.':'위치를 가져올 수 없습니다.');},
    {enableHighAccuracy:false,timeout:5000,maximumAge:60000});
  navigator.geolocation.getCurrentPosition(show,function(){},
    {enableHighAccuracy:true,timeout:12000,maximumAge:0});
}
</script>
</body>
</html>
